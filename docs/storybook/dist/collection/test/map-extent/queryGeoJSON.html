<!DOCTYPE html>
<html lang="en">

<head>
  <title>GeoJSON Query Response Test</title>
  <meta charset="UTF-8">
  <script type="module" src="/build/gcds-ext-map.esm.js"></script>
  <script nomodule src="/build/gcds-ext-map.js"></script>
</head>

<body>
  <gcds-ext-map style="width: 500px;height: 500px;" projection="OSMTILE" zoom="10" lat="45.4" lon="-75.7" controls>
    <map-layer label="GeoJSON Query Layer" checked>
      <map-extent label="GeoJSON CRS:84 query" units="OSMTILE" checked>
        <map-input name="i" type="location" units="map" axis="i"></map-input>
        <map-input name="j" type="location" units="map" axis="j"></map-input>
        <map-input name="xmin" type="location" units="gcrs" axis="longitude" position="top-left" min="-180" max="180"></map-input>
        <map-input name="ymin" type="location" units="gcrs" axis="latitude" position="bottom-right" min="-90" max="90"></map-input>
        <map-input name="xmax" type="location" units="gcrs" axis="longitude" position="bottom-right" min="-180" max="180"></map-input>
        <map-input name="ymax" type="location" units="gcrs" axis="latitude" position="top-left" min="-90" max="90"></map-input>
        <map-input name="w" type="width"></map-input>
        <map-input name="h" type="height"></map-input>
        <map-link rel="query" tref="http://localhost:3333/data/query/geojsonFeature?{i}{j}{xmin}{ymin}{xmax}{ymax}{w}{h}"></map-link>
      </map-extent>
      <map-extent label="GeoJSON with crs member" units="OSMTILE" checked>
        <map-input name="i" type="location" units="map" axis="i"></map-input>
        <map-input name="j" type="location" units="map" axis="j"></map-input>
        <map-input name="xmin" type="location" units="gcrs" axis="longitude" position="top-left" min="-180" max="180"></map-input>
        <map-input name="ymin" type="location" units="gcrs" axis="latitude" position="bottom-right" min="-90" max="90"></map-input>
        <map-input name="xmax" type="location" units="gcrs" axis="longitude" position="bottom-right" min="-180" max="180"></map-input>
        <map-input name="ymax" type="location" units="gcrs" axis="latitude" position="top-left" min="-90" max="90"></map-input>
        <map-input name="w" type="width"></map-input>
        <map-input name="h" type="height"></map-input>
        <map-link rel="query" tref="http://localhost:3333/data/query/geojsonProjectedWithCrs?{i}{j}{xmin}{ymin}{xmax}{ymax}{w}{h}"></map-link>
      </map-extent>
      <map-extent label="GeoJSON projected no crs" units="OSMTILE" checked>
        <map-input name="i" type="location" units="map" axis="i"></map-input>
        <map-input name="j" type="location" units="map" axis="j"></map-input>
        <map-input name="xmin" type="location" units="gcrs" axis="longitude" position="top-left" min="-180" max="180"></map-input>
        <map-input name="ymin" type="location" units="gcrs" axis="latitude" position="bottom-right" min="-90" max="90"></map-input>
        <map-input name="xmax" type="location" units="gcrs" axis="longitude" position="bottom-right" min="-180" max="180"></map-input>
        <map-input name="ymax" type="location" units="gcrs" axis="latitude" position="top-left" min="-90" max="90"></map-input>
        <map-input name="w" type="width"></map-input>
        <map-input name="h" type="height"></map-input>
        <map-link rel="query" tref="http://localhost:3333/data/query/geojsonProjectedNoCrs?{i}{j}{xmin}{ymin}{xmax}{ymax}{w}{h}"></map-link>
      </map-extent>
      <map-extent label="GeoJSON null geometry" units="OSMTILE" checked>
        <map-input name="i" type="location" units="map" axis="i"></map-input>
        <map-input name="j" type="location" units="map" axis="j"></map-input>
        <map-input name="xmin" type="location" units="gcrs" axis="longitude" position="top-left" min="-180" max="180"></map-input>
        <map-input name="ymin" type="location" units="gcrs" axis="latitude" position="bottom-right" min="-90" max="90"></map-input>
        <map-input name="xmax" type="location" units="gcrs" axis="longitude" position="bottom-right" min="-180" max="180"></map-input>
        <map-input name="ymax" type="location" units="gcrs" axis="latitude" position="top-left" min="-90" max="90"></map-input>
        <map-input name="w" type="width"></map-input>
        <map-input name="h" type="height"></map-input>
        <map-link rel="query" tref="http://localhost:3333/data/query/geojsonNullGeometry?{i}{j}{xmin}{ymin}{xmax}{ymax}{w}{h}"></map-link>
      </map-extent>
      <map-extent label="GeoJSON erroneous media type" units="OSMTILE" checked>
        <map-input name="i" type="location" units="map" axis="i"></map-input>
        <map-input name="j" type="location" units="map" axis="j"></map-input>
        <map-input name="xmin" type="location" units="gcrs" axis="longitude" position="top-left" min="-180" max="180"></map-input>
        <map-input name="ymin" type="location" units="gcrs" axis="latitude" position="bottom-right" min="-90" max="90"></map-input>
        <map-input name="xmax" type="location" units="gcrs" axis="longitude" position="bottom-right" min="-180" max="180"></map-input>
        <map-input name="ymax" type="location" units="gcrs" axis="latitude" position="top-left" min="-90" max="90"></map-input>
        <map-input name="w" type="width"></map-input>
        <map-input name="h" type="height"></map-input>
        <map-link rel="query" tref="http://localhost:3333/data/query/geojsonErroneousMediaType?{i}{j}{xmin}{ymin}{xmax}{ymax}{w}{h}"></map-link>
      </map-extent>
    </map-layer>
  </gcds-ext-map>
</body>

</html>
